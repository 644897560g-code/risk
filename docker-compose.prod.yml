# Production docker-compose — uses pre-built images from CI/CD
# Run on Aliyun ECS:
#   docker-compose -f docker-compose.prod.yml pull
#   docker-compose -f docker-compose.prod.yml up -d

version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    image: ${DOCKER_USERNAME}/riskforge-backend:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_KEY=${API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DEBUG=false
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-qwen/qwen3.6-plus}

  frontend:
    image: ${DOCKER_USERNAME}/riskforge-frontend:latest
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  redis_data:
