version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    # 本地开发用 build，CI/CD 用 image
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: ${DOCKER_USERNAME:-riskforge}/riskforge-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_KEY=${API_KEY:-}
      - DEBUG=${DEBUG:-false}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-qwen/qwen3.6-plus}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_KEY: ${API_KEY:-}
    image: ${DOCKER_USERNAME:-riskforge}/riskforge-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  redis_data:
