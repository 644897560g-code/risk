version: "3.9"

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=riskforge
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=riskforge_ai
    volumes:
      - pg18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riskforge -d riskforge_ai"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    # 本地开发用 build，CI/CD 用 image
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: ${DOCKER_USERNAME:-riskforge}/riskforge-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg://riskforge:123456@postgres:5432/riskforge_ai
      - API_KEY=${API_KEY:-}
      - DEBUG=${DEBUG:-false}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-qwen/qwen3.6-plus}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    command: sh -c "alembic upgrade head && python scripts/init_project_data.py && uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_KEY: ${API_KEY:-}
    image: ${DOCKER_USERNAME:-riskforge}/riskforge-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pg18_data:
  redis_data:
