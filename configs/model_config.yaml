# LLM模型配置
model: qwen3.6-plus
api_key: ""  # 从环境变量QWEN_API_KEY获取
base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

# 模型参数
temperature: 0  # 默认温度值
max_tokens: 8000  # 最大token数
max_retries: 3  # 最大重试次数
retry_delay: 2  # 重试延迟（秒）

# Agent特定配置
agents:
  data_analysis:
    temperature: 0
    max_tokens: 4000

  feature_design:
    temperature: 0.7
    max_tokens: 4000

  feature_engineering:
    temperature: 0
    max_tokens: 8000

  feature_review:
    temperature: 0
    max_tokens: 4000

  feature_evaluation:
    temperature: 0
    max_tokens: 4000

  feature_deployment:
    temperature: 0
    max_tokens: 4000
