version: '3.8'

services:
  feature-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/core
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
